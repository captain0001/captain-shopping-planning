apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopping-app
  namespace: shopping-planning
spec:
  replicas: 1   # SQLite は単一プロセス必須
  selector:
    matchLabels:
      app: shopping-app
  template:
    metadata:
      labels:
        app: shopping-app
    spec:
      containers:
        - name: app
          image: docker.io/library/shopping-app:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: DB_PATH
              value: /data/shopping.db
          volumeMounts:
            - name: sqlite-storage
              mountPath: /data
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: sqlite-storage
          persistentVolumeClaim:
            claimName: sqlite-data
